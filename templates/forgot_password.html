{% extends "base.html" %}

{% block title %}Reset Password - SchemeAI{% endblock %}

{% block content %}
<section class="section-padding hero-section" style="padding-top: 100px; padding-bottom: 80px; min-height: 80vh; display: flex; align-items: center;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-5">
                <div class="card-custom p-4 bg-white shadow-lg">
                    <div class="text-center mb-4">
                        <i class="fas fa-key text-primary display-6 mb-2"></i>
                        <h3 class="fw-bold text-gradient">Password Recovery</h3>
                        <p class="text-secondary small">Provide your registered email address to receive password reset guidelines.</p>
                    </div>

                    <form action="{{ url_for('forgot_password') }}" method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token else '' }}">
                        
                        <!-- Email -->
                        <div class="mb-4">
                            <label class="form-label fw-bold small">Email Address *</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><i class="fas fa-envelope text-secondary"></i></span>
                                <input type="email" name="email" class="form-control-custom" placeholder="e.g. citizen@email.com" required style="border-top-left-radius: 0; border-bottom-left-radius: 0;">
                            </div>
                        </div>

                        <!-- Submit -->
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary-custom">Submit Recovery Request</button>
                            <a href="{{ url_for('login') }}" class="btn btn-outline-custom">Return to Login</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
